<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Chart Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --red:#ce1f07;
    --red-dark:#a31905;
    --bg:#f4f5f7;
    --card:#ffffff;
    --border:#dfe2e6;
    --text:#222;
    --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Montserrat',sans-serif;
    margin:0;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:var(--red);
    color:#fff;
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  header h1{
    font-size:20px;
    font-weight:800;
    margin:0;
    letter-spacing:.5px;
  }
  #saveStatus{
    font-size:12px;
    font-weight:600;
    opacity:.9;
  }
  .toolbar{
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:10px 20px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
  }
  .toolbar .group{
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    background:#fafafa;
    border:1px solid var(--border);
    border-radius:8px;
    flex-wrap:wrap;
  }
  .toolbar label{
    font-size:12px;
    font-weight:600;
    color:var(--muted);
  }
  select, input[type=number], input[type=text]{
    font-family:'Montserrat',sans-serif;
    padding:6px 8px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:13px;
  }
  input[type=number]{width:55px;}
  button{
    font-family:'Montserrat',sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:var(--red);
    color:#fff;
    cursor:pointer;
    transition:background .15s;
    white-space:nowrap;
  }
  button:hover{background:var(--red-dark);}
  button.secondary{
    background:#fff;
    color:var(--red);
    border:1.5px solid var(--red);
  }
  button.secondary:hover{background:#fdeceb;}
  button.toggle.active{
    background:var(--red-dark);
    box-shadow:inset 0 0 0 2px #fff;
  }
  #app{
    display:flex;
    gap:16px;
    padding:16px 20px;
    align-items:flex-start;
  }
  #roomWrap{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    min-height:520px;
  }
  #roomHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
    gap:6px;
  }
  #roomHeader h2{
    font-size:15px;
    margin:0;
    color:var(--muted);
  }
  #room{
    position:relative;
    width:100%;
    height:460px;
    background:
      linear-gradient(0deg, transparent 24px, rgba(0,0,0,.03) 25px),
      linear-gradient(90deg, transparent 24px, rgba(0,0,0,.03) 25px);
    background-size:25px 25px;
    border:2px dashed var(--border);
    border-radius:8px;
    overflow:auto;
  }
  .desk{
    position:absolute;
    min-height:62px;
    background:#fff;
    border:2px solid var(--red);
    border-radius:8px;
    display:flex;
    align-items:stretch;
    padding:4px;
    user-select:none;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
    gap:4px;
  }
  .desk.arrangeMode{
    cursor:grab;
  }
  .desk.dragging{
    opacity:.6;
    cursor:grabbing;
    z-index:50;
  }
  .seat{
    width:80px;
    min-height:50px;
    background:#fdfdfd;
    border:1.5px dashed var(--border);
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:11.5px;
    font-weight:700;
    padding:3px;
    cursor:grab;
  }
  .seat.filled{
    border-style:solid;
    border-color:var(--red);
    background:#fff;
  }
  .seat.empty{
    color:var(--muted);
    font-weight:600;
    font-style:italic;
    cursor:default;
  }
  .seat.dropTarget{
    background:#fdeceb;
    box-shadow:0 0 0 3px var(--red);
  }
  .seat.locked{
    border-color:#d4a017;
    background:#fff9e8;
    cursor:default;
  }
  .lockIcon{
    position:absolute;
    bottom:-8px;
    right:-6px;
    font-size:12px;
    cursor:pointer;
    background:#fff;
    border-radius:50%;
    line-height:1;
    padding:1px;
  }
  .deskIcons{
    position:absolute;
    top:-10px;
    right:-10px;
    display:flex;
    gap:2px;
  }
  .deskIcons span{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#333;
    color:#fff;
    font-size:11px;
    line-height:18px;
    text-align:center;
    cursor:pointer;
  }
  .deskIcons span.gear{background:#555;}
  #room.printing .deskIcons{display:none;}
  #room.printing .seat{cursor:default;}
  #room.printing .lockIcon{display:none;}
  .desk{position:absolute;}
  .deskInner{position:relative;display:flex;gap:4px;}
  #sidebar{
    width:250px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
  }
  #sidebar h2{
    font-size:15px;
    margin:0 0 10px 0;
    color:var(--muted);
  }
  #addStudentRow{
    display:flex;
    gap:6px;
    margin-bottom:10px;
  }
  #addStudentRow input{flex:1;}
  #unassignedList{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:420px;
    overflow-y:auto;
    min-height:60px;
    padding:6px;
    border:1px dashed var(--border);
    border-radius:8px;
  }
  #unassignedList.dropTarget{
    background:#fdeceb;
  }
  .chip{
    background:#fff;
    border:1.5px solid var(--red);
    color:var(--red-dark);
    border-radius:6px;
    padding:7px 10px;
    font-size:13px;
    font-weight:600;
    cursor:grab;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:6px;
  }
  .chip .del{
    cursor:pointer;
    color:#999;
    font-weight:800;
  }
  .chip .del:hover{color:var(--red);}
  #emptyMsg{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    padding:10px;
  }
  .modalBg{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modalBg.show{display:flex;}
  .modal{
    background:#fff;
    border-radius:10px;
    padding:20px;
    width:320px;
    box-shadow:0 8px 30px rgba(0,0,0,.2);
  }
  .modal h3{margin-top:0;font-size:16px;}
  .modal input{width:100%;margin-bottom:12px;}
  .modal .btnRow{display:flex;justify-content:flex-end;gap:8px;}
</style>
</head>
<body>

<header>
  <h1>🪑 Seating Chart Maker</h1>
  <div id="saveStatus">Ready</div>
</header>

<div class="toolbar">
  <div class="group">
    <label>Class</label>
    <select id="classSelect"></select>
    <button class="secondary" onclick="openNewClassModal()">+ New Class</button>
  </div>

  <div class="group">
    <label>Roster</label>
    <button class="secondary" onclick="document.getElementById('csvInput').click()">Upload CSV</button>
    <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleCSV(event)">
  </div>

  <div class="group">
    <label>Saved Layout</label>
    <select id="templateSelect"><option value="">-- choose template --</option></select>
    <button onclick="applyTemplate()">Apply</button>
    <button class="secondary" onclick="saveAsTemplate()">Save Current As...</button>
  </div>

  <div class="group">
    <label>Quick Grid</label>
    <input type="number" id="rowsInput" min="1" max="12" value="4"> ×
    <input type="number" id="colsInput" min="1" max="12" value="5">
    <select id="capacitySelect">
      <option value="1">1 seat/desk</option>
      <option value="2">2 seats/desk (lab table)</option>
    </select>
    <button onclick="generateGrid()">Generate</button>
  </div>

  <div class="group">
    <button class="toggle" id="arrangeBtn" onclick="toggleArrange()">Arrange Desks: Off</button>
    <button class="secondary" onclick="addDesk()">+ Add Desk</button>
  </div>

  <div class="group">
    <label>Shuffle</label>
    <button onclick="randomizeAll()">🔀 Randomize / Reshuffle</button>
    <label style="display:flex;align-items:center;gap:4px;font-weight:600;">
      <input type="checkbox" id="alternateGenderToggle" style="width:auto;"> Alternate gender
    </label>
    <button class="secondary" onclick="clearSeats()">Clear Seats</button>
  </div>

  <div class="group">
    <button class="secondary" onclick="exportPDF()">📄 Export PDF</button>
  </div>
</div>

<div id="app">
  <div id="roomWrap">
    <div id="roomHeader">
      <h2 id="roomTitle">No class selected</h2>
      <span style="font-size:12px;color:var(--muted)">Drag students onto seats. Toggle "Arrange Desks" to move desks; click ⚙ on a desk to set how many seats it has; click 🔒 on a filled seat to lock that student in place.</span>
    </div>
    <div id="room"></div>
  </div>

  <div id="sidebar">
    <h2>Unassigned Students</h2>
    <div id="addStudentRow">
      <input type="text" id="newStudentName" placeholder="Add student name">
      <select id="newStudentGender" style="width:60px;">
        <option value="">-</option>
        <option value="M">M</option>
        <option value="F">F</option>
      </select>
      <button onclick="addStudentManually()">+</button>
    </div>
    <div id="unassignedList" ondragover="event.preventDefault(); this.classList.add('dropTarget')"
         ondragleave="this.classList.remove('dropTarget')"
         ondrop="dropOnUnassigned(event)"></div>
  </div>
</div>

<div class="modalBg" id="newClassModal">
  <div class="modal">
    <h3>New Class / Period</h3>
    <input type="text" id="newClassName" placeholder="e.g. Period 3 - Science">
    <div class="btnRow">
      <button class="secondary" onclick="closeNewClassModal()">Cancel</button>
      <button onclick="createNewClass()">Create</button>
    </div>
  </div>
</div>

<script>
/* ====== FIREBASE CONFIG - REPLACE WITH YOUR PROJECT CONFIG ====== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "bathroom-check-out.firebaseapp.com",
  databaseURL: "https://bathroom-check-out-default-rtdb.firebaseio.com",
  projectId: "bathroom-check-out",
  storageBucket: "bathroom-check-out.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOT = "seatingCharts";

/* ====== STATE ======
  layout[deskId] = {x, y, capacity}
  seating[deskId] = { "0": studentId, "1": studentId, ... }
  roster[studentId] = {name, gender}
  locks[deskId] = { "0": true, ... }   // locked seat slots for current class
  layoutTemplates[templateId] = {name, desks: {deskId:{x,y,capacity}}}
*/
let currentClassId = null;
let roster = {};
let layout = {};
let seating = {};
let locks = {};
let templates = {};
let arrangeMode = false;

function setStatus(msg){
  document.getElementById('saveStatus').textContent = msg;
  setTimeout(()=>{ document.getElementById('saveStatus').textContent = "Ready"; }, 1500);
}
function slugId(prefix){
  return prefix + "_" + Math.random().toString(36).slice(2,9);
}

/* ====== CLASS LIST ====== */
function loadClassList(){
  db.ref(`${ROOT}/classes`).on('value', snap => {
    const classes = snap.val() || {};
    const sel = document.getElementById('classSelect');
    const prev = currentClassId;
    sel.innerHTML = '<option value="">-- select class --</option>';
    Object.entries(classes).forEach(([id,c])=>{
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
    if(prev && classes[prev]) sel.value = prev;
  });
}

document.getElementById('classSelect').addEventListener('change', (e)=>{
  selectClass(e.target.value);
});

function selectClass(id){
  currentClassId = id || null;
  if(!currentClassId){
    document.getElementById('roomTitle').textContent = "No class selected";
    document.getElementById('room').innerHTML = "";
    document.getElementById('unassignedList').innerHTML = "";
    return;
  }
  db.ref(`${ROOT}/classes/${currentClassId}/name`).once('value').then(s=>{
    document.getElementById('roomTitle').textContent = s.val() || "Class";
  });
  attachClassListeners();
}

function attachClassListeners(){
  db.ref(`${ROOT}/rosters/${currentClassId}`).on('value', snap=>{
    roster = snap.val() || {};
    render();
  });
  db.ref(`${ROOT}/layouts/${currentClassId}`).on('value', snap=>{
    layout = snap.val() || {};
    render();
  });
  db.ref(`${ROOT}/seating/${currentClassId}`).on('value', snap=>{
    seating = snap.val() || {};
    render();
  });
  db.ref(`${ROOT}/locks/${currentClassId}`).on('value', snap=>{
    locks = snap.val() || {};
    render();
  });
}

/* ====== NEW CLASS MODAL ====== */
function openNewClassModal(){ document.getElementById('newClassModal').classList.add('show'); }
function closeNewClassModal(){ document.getElementById('newClassModal').classList.remove('show'); }
function createNewClass(){
  const name = document.getElementById('newClassName').value.trim();
  if(!name) return;
  const id = slugId('class');
  db.ref(`${ROOT}/classes/${id}`).set({name, createdAt: Date.now()});
  document.getElementById('newClassName').value = '';
  closeNewClassModal();
  document.getElementById('classSelect').value = id;
  selectClass(id);
}

/* ====== ROSTER ====== */
function addStudentManually(){
  if(!currentClassId){ alert('Select or create a class first.'); return; }
  const input = document.getElementById('newStudentName');
  const genderSelect = document.getElementById('newStudentGender');
  const name = input.value.trim();
  if(!name) return;
  const id = slugId('stu');
  db.ref(`${ROOT}/rosters/${currentClassId}/${id}`).set({name, gender: genderSelect.value || ""});
  input.value = '';
  genderSelect.value = '';
}

function removeStudent(id){
  if(!confirm('Remove this student from the roster?')) return;
  db.ref(`${ROOT}/rosters/${currentClassId}/${id}`).remove();
  Object.entries(seating).forEach(([deskId, seats])=>{
    Object.entries(seats||{}).forEach(([slot, stuId])=>{
      if(stuId === id) db.ref(`${ROOT}/seating/${currentClassId}/${deskId}/${slot}`).remove();
    });
  });
}

function handleCSV(event){
  if(!currentClassId){ alert('Select or create a class first.'); event.target.value=''; return; }
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const lines = e.target.result.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const updates = {};
    lines.forEach(line=>{
      let clean = line.replace(/["']/g,'');
      let name, gender = "";
      const parts = clean.split(',').map(s=>s.trim());
      if(parts.length >= 3){
        name = `${parts[1]} ${parts[0]}`;
        const g = parts[2].toUpperCase();
        gender = g.startsWith('M') ? 'M' : g.startsWith('F') ? 'F' : '';
      } else if(parts.length === 2){
        name = `${parts[1]} ${parts[0]}`;
      } else {
        name = parts[0];
      }
      if(name){
        const id = slugId('stu');
        updates[id] = {name, gender};
      }
    });
    db.ref(`${ROOT}/rosters/${currentClassId}`).update(updates);
    setStatus('Roster imported');
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* ====== LAYOUT TEMPLATES ====== */
function loadTemplateList(){
  db.ref(`${ROOT}/layoutTemplates`).on('value', snap=>{
    templates = snap.val() || {};
    const sel = document.getElementById('templateSelect');
    const prev = sel.value;
    sel.innerHTML = '<option value="">-- choose template --</option>';
    Object.entries(templates).forEach(([id,t])=>{
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
    if(templates[prev]) sel.value = prev;
  });
}

function applyTemplate(){
  if(!currentClassId){ alert('Select or create a class first.'); return; }
  const id = document.getElementById('templateSelect').value;
  if(!id){ alert('Choose a saved layout first.'); return; }
  const tmpl = templates[id];
  if(!tmpl) return;
  if(!confirm(`Apply "${tmpl.name}" to this class? Current desks and seating for this class will be replaced.`)) return;
  db.ref(`${ROOT}/layouts/${currentClassId}`).set(tmpl.desks || {});
  db.ref(`${ROOT}/seating/${currentClassId}`).remove();
  setStatus('Layout applied');
}

function saveAsTemplate(){
  if(!currentClassId){ alert('Select or create a class first.'); return; }
  if(Object.keys(layout).length === 0){ alert('No desks to save yet.'); return; }
  const name = prompt('Name this layout (e.g. "Rows" or "Groups"):');
  if(!name) return;
  const id = slugId('tmpl');
  db.ref(`${ROOT}/layoutTemplates/${id}`).set({name, desks: layout});
  setStatus('Layout saved');
}

/* ====== GRID GENERATION ====== */
function generateGrid(){
  if(!currentClassId){ alert('Select or create a class first.'); return; }
  const rows = parseInt(document.getElementById('rowsInput').value) || 4;
  const cols = parseInt(document.getElementById('colsInput').value) || 5;
  const capacity = parseInt(document.getElementById('capacitySelect').value) || 1;
  if(!confirm(`This replaces the current desk layout with a ${rows}x${cols} grid (${capacity} seat${capacity>1?'s':''}/desk). Continue?`)) return;

  const deskWidth = capacity * 84 + (capacity-1)*4 + 8;
  const gapX = deskWidth + 20, gapY = 80, startX = 15, startY = 15;
  const newLayout = {};
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const id = `d_${r}_${c}_${Math.random().toString(36).slice(2,5)}`;
      newLayout[id] = { x: startX + c*gapX, y: startY + r*gapY, capacity };
    }
  }
  db.ref(`${ROOT}/layouts/${currentClassId}`).set(newLayout);
  db.ref(`${ROOT}/seating/${currentClassId}`).remove();
}

function addDesk(){
  if(!currentClassId){ alert('Select or create a class first.'); return; }
  const id = slugId('desk');
  db.ref(`${ROOT}/layouts/${currentClassId}/${id}`).set({x: 20, y: 20, capacity: 1});
}

function removeDesk(deskId){
  db.ref(`${ROOT}/layouts/${currentClassId}/${deskId}`).remove();
  db.ref(`${ROOT}/seating/${currentClassId}/${deskId}`).remove();
}

function editCapacity(deskId){
  const current = (layout[deskId] && layout[deskId].capacity) || 1;
  const val = prompt('How many seats at this desk/table?', current);
  const n = parseInt(val);
  if(!n || n < 1 || n > 6) return;
  db.ref(`${ROOT}/layouts/${currentClassId}/${deskId}/capacity`).set(n);
  const seatsHere = seating[deskId] || {};
  Object.keys(seatsHere).forEach(slot=>{
    if(parseInt(slot) >= n){
      db.ref(`${ROOT}/seating/${currentClassId}/${deskId}/${slot}`).remove();
    }
  });
}

function toggleArrange(){
  arrangeMode = !arrangeMode;
  const btn = document.getElementById('arrangeBtn');
  btn.textContent = `Arrange Desks: ${arrangeMode ? 'On' : 'Off'}`;
  btn.classList.toggle('active', arrangeMode);
  render();
}

/* ====== SEATING ACTIONS ====== */
function randomizeAll(){
  if(!currentClassId) return;
  if(Object.keys(layout).length === 0){ alert('Generate or add desks first.'); return; }

  const alternate = document.getElementById('alternateGenderToggle').checked;

  // Seats in reading order (top-to-bottom, left-to-right) so alternation looks right
  const deskEntries = Object.entries(layout).sort((a,b)=>{
    if(Math.abs(a[1].y - b[1].y) > 20) return a[1].y - b[1].y;
    return a[1].x - b[1].x;
  });

  const openSlots = [];
  deskEntries.forEach(([deskId, d])=>{
    const cap = d.capacity || 1;
    for(let i=0;i<cap;i++){
      const isLocked = locks[deskId] && locks[deskId][i];
      if(!isLocked) openSlots.push({deskId, slot:i});
    }
  });
  if(openSlots.length === 0){ alert('Every seat is locked — unlock at least one to reshuffle.'); return; }

  // Students already sitting in a locked seat stay put and are excluded from the shuffle pool
  const lockedStudentIds = new Set();
  Object.entries(seating).forEach(([deskId, seats])=>{
    Object.entries(seats||{}).forEach(([slot, sid])=>{
      if(sid && locks[deskId] && locks[deskId][slot]) lockedStudentIds.add(sid);
    });
  });
  const pool = Object.keys(roster).filter(id => !lockedStudentIds.has(id));

  let ordered;
  if(alternate){
    const groups = {};
    pool.forEach(id=>{
      const g = roster[id].gender || 'unspecified';
      groups[g] = groups[g] || [];
      groups[g].push(id);
    });
    Object.values(groups).forEach(arr => arr.sort(()=>Math.random()-0.5));
    ordered = [];
    const keys = Object.keys(groups);
    let added = true;
    while(added){
      added = false;
      for(const k of keys){
        if(groups[k].length){
          ordered.push(groups[k].shift());
          added = true;
        }
      }
    }
  } else {
    ordered = [...pool].sort(()=>Math.random()-0.5);
  }

  // Keep locked assignments, then fill open slots with the ordered pool
  const newSeating = {};
  Object.entries(seating).forEach(([deskId, seats])=>{
    Object.entries(seats||{}).forEach(([slot, sid])=>{
      if(sid && locks[deskId] && locks[deskId][slot]){
        newSeating[deskId] = newSeating[deskId] || {};
        newSeating[deskId][slot] = sid;
      }
    });
  });
  openSlots.forEach((s, i)=>{
    if(ordered[i]){
      newSeating[s.deskId] = newSeating[s.deskId] || {};
      newSeating[s.deskId][s.slot] = ordered[i];
    }
  });

  db.ref(`${ROOT}/seating/${currentClassId}`).set(newSeating);
  setStatus('Reshuffled');
}

function toggleLock(deskId, slot){
  const isLocked = locks[deskId] && locks[deskId][slot];
  if(isLocked){
    db.ref(`${ROOT}/locks/${currentClassId}/${deskId}/${slot}`).remove();
  } else {
    db.ref(`${ROOT}/locks/${currentClassId}/${deskId}/${slot}`).set(true);
  }
}

function cycleGender(id){
  const order = ['', 'M', 'F'];
  const current = (roster[id] && roster[id].gender) || '';
  const next = order[(order.indexOf(current) + 1) % order.length];
  db.ref(`${ROOT}/rosters/${currentClassId}/${id}/gender`).set(next);
}

function clearSeats(){
  if(!currentClassId) return;
  if(!confirm('Send all students back to Unassigned?')) return;
  db.ref(`${ROOT}/seating/${currentClassId}`).remove();
}

function seatStudent(deskId, slot, studentId){
  const updates = {};
  Object.entries(seating).forEach(([dId, seats])=>{
    Object.entries(seats||{}).forEach(([idx, sId])=>{
      if(sId === studentId) updates[`${dId}/${idx}`] = null;
    });
  });
  updates[`${deskId}/${slot}`] = studentId;
  db.ref(`${ROOT}/seating/${currentClassId}`).update(updates);
}

function unseatSlot(deskId, slot){
  db.ref(`${ROOT}/seating/${currentClassId}/${deskId}/${slot}`).remove();
}

/* ====== DRAG & DROP ====== */
function dropOnSeat(event, deskId, slot){
  event.preventDefault();
  event.currentTarget.classList.remove('dropTarget');
  const studentId = event.dataTransfer.getData('text/student');
  if(studentId) seatStudent(deskId, slot, studentId);
}

function dropOnUnassigned(event){
  event.preventDefault();
  document.getElementById('unassignedList').classList.remove('dropTarget');
  const deskId = event.dataTransfer.getData('text/seat-desk');
  const slot = event.dataTransfer.getData('text/seat-slot');
  if(deskId !== '' && slot !== '') unseatSlot(deskId, slot);
}

/* ====== RENDER ====== */
function render(){
  const room = document.getElementById('room');
  room.innerHTML = '';
  const seatedIds = new Set();
  Object.values(seating).forEach(seats=>{
    Object.values(seats||{}).forEach(sid=>{ if(sid) seatedIds.add(sid); });
  });

  Object.entries(layout).forEach(([deskId, pos])=>{
    const capacity = pos.capacity || 1;
    const desk = document.createElement('div');
    desk.className = 'desk' + (arrangeMode ? ' arrangeMode' : '');
    desk.style.left = pos.x + 'px';
    desk.style.top = pos.y + 'px';

    const icons = document.createElement('div');
    icons.className = 'deskIcons';
    const gear = document.createElement('span');
    gear.className = 'gear';
    gear.textContent = '⚙';
    gear.title = 'Set seat count';
    gear.onclick = (e)=>{ e.stopPropagation(); editCapacity(deskId); };
    const remove = document.createElement('span');
    remove.textContent = '×';
    remove.title = 'Remove desk';
    remove.onclick = (e)=>{ e.stopPropagation(); removeDesk(deskId); };
    icons.appendChild(gear);
    icons.appendChild(remove);
    desk.appendChild(icons);

    for(let i=0;i<capacity;i++){
      const studentId = seating[deskId] ? seating[deskId][i] : null;
      const isLocked = !!(locks[deskId] && locks[deskId][i]);
      const seat = document.createElement('div');
      seat.className = 'seat' + (studentId ? ' filled' : ' empty') + (isLocked ? ' locked' : '');
      seat.style.position = 'relative';

      const label = document.createElement('span');
      label.textContent = studentId && roster[studentId] ? roster[studentId].name : 'Empty';
      seat.appendChild(label);

      if(studentId && !arrangeMode){
        const lockIcon = document.createElement('span');
        lockIcon.className = 'lockIcon';
        lockIcon.textContent = isLocked ? '🔒' : '🔓';
        lockIcon.title = isLocked ? 'Unlock this seat' : 'Lock this student in place';
        lockIcon.onclick = (e)=>{ e.stopPropagation(); toggleLock(deskId, i); };
        seat.appendChild(lockIcon);
      }

      if(!arrangeMode && !isLocked){
        seat.ondragover = (e)=>{ e.preventDefault(); seat.classList.add('dropTarget'); };
        seat.ondragleave = ()=> seat.classList.remove('dropTarget');
        seat.ondrop = (e)=> dropOnSeat(e, deskId, i);
        if(studentId){
          seat.draggable = true;
          seat.ondragstart = (e)=>{
            e.dataTransfer.setData('text/student', studentId);
            e.dataTransfer.setData('text/seat-desk', deskId);
            e.dataTransfer.setData('text/seat-slot', String(i));
          };
        }
      }
      desk.appendChild(seat);
    }

    if(arrangeMode){
      desk.onmousedown = (e)=> startDeskDrag(e, deskId, desk);
    }

    room.appendChild(desk);
  });

  const list = document.getElementById('unassignedList');
  list.innerHTML = '';
  const unassigned = Object.entries(roster).filter(([id])=>!seatedIds.has(id));
  if(unassigned.length === 0){
    list.innerHTML = '<div id="emptyMsg">Everyone is seated 🎉</div>';
  }
  unassigned.forEach(([id, stu])=>{
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.draggable = true;
    chip.ondragstart = (e)=>{
      e.dataTransfer.setData('text/student', id);
      e.dataTransfer.setData('text/seat-desk', '');
      e.dataTransfer.setData('text/seat-slot', '');
    };
    const nameSpan = document.createElement('span');
    nameSpan.textContent = stu.name;
    const genderBadge = document.createElement('span');
    genderBadge.textContent = stu.gender ? `(${stu.gender})` : '(-)';
    genderBadge.title = 'Click to set gender (used for alternating shuffle)';
    genderBadge.style.cursor = 'pointer';
    genderBadge.style.color = 'var(--muted)';
    genderBadge.style.fontSize = '11px';
    genderBadge.onclick = ()=> cycleGender(id);
    const del = document.createElement('span');
    del.className = 'del';
    del.textContent = '×';
    del.onclick = ()=> removeStudent(id);
    chip.appendChild(nameSpan);
    chip.appendChild(genderBadge);
    chip.appendChild(del);
    list.appendChild(chip);
  });
}

/* ====== DESK DRAGGING (arrange mode) ====== */
function startDeskDrag(e, deskId, deskEl){
  if(e.target.tagName === 'SPAN') return; // clicked an icon, not a drag
  const roomRect = document.getElementById('room').getBoundingClientRect();
  const deskRect = deskEl.getBoundingClientRect();
  const offsetX = e.clientX - deskRect.left;
  const offsetY = e.clientY - deskRect.top;
  deskEl.classList.add('dragging');

  function onMove(ev){
    const x = ev.clientX - roomRect.left - offsetX;
    const y = ev.clientY - roomRect.top - offsetY;
    deskEl.style.left = Math.max(0, x) + 'px';
    deskEl.style.top = Math.max(0, y) + 'px';
  }
  function onUp(){
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    deskEl.classList.remove('dragging');
    const x = parseInt(deskEl.style.left);
    const y = parseInt(deskEl.style.top);
    db.ref(`${ROOT}/layouts/${currentClassId}/${deskId}`).update({x, y});
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ====== EXPORT PDF ====== */
function exportPDF(){
  if(!currentClassId){ alert('Select a class first.'); return; }
  const room = document.getElementById('room');
  if(Object.keys(layout).length === 0){ alert('No desks to export yet.'); return; }

  const title = document.getElementById('roomTitle').textContent;
  const originalOverflow = room.style.overflow;
  const originalHeight = room.style.height;

  // Expand room so the whole layout is captured, not just the visible scroll area
  room.classList.add('printing');
  room.style.overflow = 'visible';
  room.style.height = room.scrollHeight + 'px';

  setStatus('Building PDF...');

  html2canvas(room, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
    room.classList.remove('printing');
    room.style.overflow = originalOverflow;
    room.style.height = originalHeight;

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const imgW = canvas.width / 2;
    const imgH = canvas.height / 2;
    const margin = 30;
    const pageW = imgW + margin * 2;
    const pageH = imgH + margin * 2 + 30;

    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'pt',
      format: [Math.max(pageW, pageH), Math.min(pageW, pageH)]
    });

    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(16);
    pdf.setTextColor(206, 31, 7); // matches --red
    pdf.text(title, margin, margin);

    pdf.addImage(imgData, 'PNG', margin, margin + 15, imgW, imgH);

    const fileName = title.replace(/[^a-z0-9]+/gi, '_') + '_seating_chart.pdf';
    pdf.save(fileName);
    setStatus('PDF saved');
  }).catch(err => {
    room.classList.remove('printing');
    room.style.overflow = originalOverflow;
    room.style.height = originalHeight;
    alert('Export failed: ' + err.message);
  });
}
